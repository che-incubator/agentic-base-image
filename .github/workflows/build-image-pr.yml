name: Build image (PR validation)

on:
  pull_request:
    branches: [main]

env:
  IMAGE: quay.io/che-incubator/agent-base-image

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}

      - name: Set tag expiration (14 days)
        continue-on-error: true
        run: |
          EXPIRATION=$(date -u -d '+14 days' +%s)
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.QUAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"expiration\": ${EXPIRATION}}" \
            "https://quay.io/api/v1/repository/che-incubator/agent-base-image/tag/pr-${{ github.event.pull_request.number }}"
